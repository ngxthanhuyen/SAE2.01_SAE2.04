<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carte des Stations Piézométriques</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""/>   
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
     integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
     crossorigin=""></script> 
</head>
<body>
    <div class="recherche">
        <div class="input-group">
            <label for="search">Votre ville</label>
            <div class="autocomplete-wrapper">
                <input type="text" id="search" placeholder="Entrez votre ville" oninput="getCommuneData()">
                <div class="autocomplete-list">
                    <div id="autocomplete"></div>
                </div>
            </div>
        </div>
        <div class="input-group">
            <label>Dans un rayon de</label>
            <select id="radius">
                <option value="5">Moins de 5 km</option>
                <option value="10">Moins de 10 km</option>
                <option value="20">Moins de 20 km</option>
            </select>
        </div>
        <button class="button" onclick="searchStations()">Rechercher</button>
    </div>
    <div id="map"></div>
    
    <script src="/static/app.js"></script>
</body>
</html>
